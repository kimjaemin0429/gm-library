<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📚 책 찾기 - 광명시 도서관</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Round+Square:wght@400;700;800;900&display=swap');

:root {
  --bg:       #FFF8E1;
  --primary:  #FF7043;
  --pri-dark: #E64A19;
  --blue:     #42A5F5;
  --blue-dk:  #1565C0;
  --green:    #66BB6A;
  --grn-dk:   #2E7D32;
  --orange:   #FFA726;
  --purple:   #AB47BC;
  --text:     #3E2723;
  --gray:     #90A4AE;
  --white:    #FFFFFF;
  --shadow:   0 8px 32px rgba(0,0,0,.10);
  --radius:   28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nanum Round Square', 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 배경 장식 ── */
.bg-deco {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.star {
  position: absolute;
  font-size: 22px;
  opacity: .35;
  animation: twinkle 3s ease-in-out infinite;
}
.star:nth-child(1)  { top:4%;  left:8%;  animation-delay:0s;   font-size:18px; }
.star:nth-child(2)  { top:9%;  left:78%; animation-delay:.6s;  font-size:26px; }
.star:nth-child(3)  { top:18%; left:92%; animation-delay:1.2s; font-size:16px; }
.star:nth-child(4)  { top:35%; left:3%;  animation-delay:1.8s; font-size:20px; }
.star:nth-child(5)  { top:55%; left:95%; animation-delay:2.4s; font-size:14px; }
.star:nth-child(6)  { top:72%; left:6%;  animation-delay:.9s;  font-size:24px; }
.star:nth-child(7)  { top:85%; left:85%; animation-delay:1.5s; font-size:18px; }
.star:nth-child(8)  { top:92%; left:45%; animation-delay:2.1s; font-size:16px; }
@keyframes twinkle {
  0%,100% { opacity:.2; transform:scale(1); }
  50%      { opacity:.5; transform:scale(1.2); }
}

/* ── 래퍼 ── */
.wrap {
  position: relative; z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* ── 헤더 ── */
.header {
  text-align: center;
  margin-bottom: 28px;
}
.header-mascot {
  font-size: 72px;
  line-height: 1;
  display: block;
  margin-bottom: 4px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
.header h1 {
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 900;
  color: var(--primary);
  text-shadow: 0 2px 0 rgba(230,74,25,.15);
  letter-spacing: -1px;
}
.header-sub {
  font-size: clamp(14px, 3vw, 17px);
  font-weight: 800;
  color: var(--blue-dk);
  margin-top: 6px;
}

/* ── 말풍선 안내 ── */
.bubble-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  margin-bottom: 20px;
}
.bubble-char { font-size: 40px; flex-shrink: 0; }
.bubble {
  background: var(--white);
  border: 3px solid var(--primary);
  border-radius: 20px 20px 20px 4px;
  padding: 12px 18px;
  font-size: clamp(14px, 3vw, 16px);
  font-weight: 800;
  color: var(--text);
  box-shadow: 0 4px 12px rgba(255,112,67,.15);
  flex: 1;
  position: relative;
}

/* ── 스텝 카드 ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: clamp(20px, 4vw, 32px);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  transition: opacity .3s, transform .3s;
  border: 3px solid transparent;
}
.card.active  { border-color: var(--primary); }
.card.done    { border-color: var(--green); }
.card.locked  { opacity: .45; pointer-events: none; }

.step-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: white;
  border-radius: 30px;
  padding: 6px 16px;
  font-size: 14px;
  font-weight: 900;
  margin-bottom: 16px;
}
.step-badge.done-badge { background: var(--green); }

.card-title {
  font-size: clamp(18px, 4vw, 24px);
  font-weight: 900;
  color: var(--text);
  margin-bottom: 18px;
  line-height: 1.3;
}

/* ── 도서관 그리드 ── */
.lib-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
@media (max-width: 400px) {
  .lib-grid { grid-template-columns: repeat(2, 1fr); }
}

.lib-btn {
  background: #FFF3E0;
  border: 3px solid #FFCC80;
  border-radius: 20px;
  padding: clamp(14px, 3vw, 20px) 8px;
  cursor: pointer;
  text-align: center;
  transition: all .18s;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.lib-btn:hover  { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(255,112,67,.2); }
.lib-btn:active { transform: scale(.96); }
.lib-btn.selected {
  background: #FFE0B2;
  border-color: var(--primary);
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(255,112,67,.25);
}
.lib-icon { font-size: clamp(28px, 6vw, 40px); display: block; margin-bottom: 8px; }
.lib-name { font-size: clamp(13px, 2.5vw, 16px); font-weight: 900; color: var(--text); }
.lib-check {
  display: none;
  font-size: 18px;
  margin-top: 4px;
}
.lib-btn.selected .lib-check { display: block; }

/* ── 검색창 ── */
.search-wrap {
  display: flex;
  gap: 10px;
  margin-bottom: 4px;
}
.search-input {
  flex: 1;
  padding: clamp(14px, 3vw, 18px) clamp(14px, 3vw, 20px);
  border: 3px solid #FFCC80;
  border-radius: 18px;
  font-size: clamp(16px, 3.5vw, 20px);
  font-family: inherit;
  font-weight: 800;
  color: var(--text);
  outline: none;
  background: #FFFDE7;
  transition: border .2s, box-shadow .2s;
}
.search-input::placeholder { color: #BCAAA4; }
.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(255,112,67,.12);
}
.search-btn {
  padding: 0 clamp(16px, 4vw, 26px);
  background: linear-gradient(135deg, var(--primary), #FF8A65);
  color: white;
  border: none;
  border-radius: 18px;
  font-size: clamp(20px, 5vw, 28px);
  cursor: pointer;
  transition: all .18s;
  flex-shrink: 0;
  min-width: clamp(56px, 14vw, 72px);
  box-shadow: 0 4px 14px rgba(255,112,67,.35);
}
.search-btn:hover  { transform: scale(1.06); box-shadow: 0 6px 20px rgba(255,112,67,.45); }
.search-btn:active { transform: scale(.95); }

/* ── 로딩 ── */
.loading {
  display: none;
  text-align: center;
  padding: 28px;
}
.loading-emoji {
  font-size: 44px;
  display: inline-block;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 16px; font-weight: 800; color: var(--blue-dk); margin-top: 10px; }

/* ── 책 목록 ── */
.book-list {
  display: none;
  flex-direction: column;
  gap: 10px;
  margin-top: 14px;
}
.book-item {
  display: flex;
  align-items: center;
  gap: 14px;
  background: #FFF8E1;
  border: 3px solid #FFCC80;
  border-radius: 18px;
  padding: 12px 16px;
  cursor: pointer;
  transition: all .18s;
  -webkit-tap-highlight-color: transparent;
}
.book-item:hover  { border-color: var(--primary); background: #FFF3E0; transform: translateX(4px); }
.book-item:active { transform: scale(.98); }
.book-cover {
  width: clamp(44px, 10vw, 56px);
  height: clamp(56px, 13vw, 70px);
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  background: #FFE0B2;
}
.book-cover-ph {
  width: clamp(44px, 10vw, 56px);
  height: clamp(56px, 13vw, 70px);
  border-radius: 8px;
  background: linear-gradient(135deg, #FFE0B2, #FFCC80);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.book-info { flex: 1; min-width: 0; }
.book-title {
  font-size: clamp(14px, 3vw, 17px);
  font-weight: 900;
  color: var(--text);
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.book-author { font-size: clamp(11px, 2.5vw, 13px); color: var(--gray); font-weight: 700; }
.book-tap {
  font-size: clamp(18px, 4vw, 24px);
  flex-shrink: 0;
  animation: tapme 1.5s ease-in-out infinite;
}
@keyframes tapme {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.2); }
}

/* ── 결과 카드 ── */
.result-box {
  display: none;
  border-radius: 22px;
  padding: clamp(22px, 5vw, 36px) clamp(18px, 4vw, 30px);
  text-align: center;
  animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
  margin-top: 4px;
}
@keyframes popIn {
  from { transform: scale(.8); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}
.result-box.ok    { background: linear-gradient(135deg,#E8F5E9,#C8E6C9); border: 4px solid #66BB6A; }
.result-box.wait  { background: linear-gradient(135deg,#FFF8E1,#FFE082); border: 4px solid #FFC107; }
.result-box.none  { background: linear-gradient(135deg,#F3E5F5,#E1BEE7); border: 4px solid #AB47BC; }
.result-box.err   { background: linear-gradient(135deg,#FFEBEE,#FFCDD2); border: 4px solid #EF5350; }

.result-big-emoji { font-size: clamp(56px, 14vw, 80px); line-height: 1; margin-bottom: 12px; display: block; }
.result-title {
  font-size: clamp(20px, 5vw, 28px);
  font-weight: 900;
  color: var(--text);
  margin-bottom: 10px;
}
.result-book-chip {
  display: inline-block;
  background: rgba(255,255,255,.75);
  border-radius: 30px;
  padding: 6px 18px;
  font-size: clamp(13px, 2.8vw, 15px);
  font-weight: 800;
  color: var(--blue-dk);
  margin-bottom: 10px;
  max-width: 100%;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.result-desc {
  font-size: clamp(14px, 3vw, 16px);
  font-weight: 800;
  color: #4E342E;
  line-height: 1.7;
  white-space: pre-line;
}
.result-lib-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 14px;
  background: rgba(255,255,255,.6);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: clamp(12px, 2.5vw, 14px);
  font-weight: 800;
  color: #5D4037;
}

/* ── 다시하기 버튼 ── */
.reset-btn {
  display: none;
  width: 100%;
  margin-top: 16px;
  padding: clamp(16px, 4vw, 20px);
  background: linear-gradient(135deg, var(--blue), #64B5F6);
  color: white;
  border: none;
  border-radius: 20px;
  font-size: clamp(16px, 3.5vw, 20px);
  font-weight: 900;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 6px 20px rgba(66,165,245,.35);
  transition: all .18s;
}
.reset-btn:hover  { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(66,165,245,.4); }
.reset-btn:active { transform: scale(.97); }
.reset-btn.show { display: block; }

/* ── 진행 바 (상단 고정) ── */
.progress-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 22px;
}
.prog-dot {
  width: clamp(32px, 8vw, 44px);
  height: clamp(32px, 8vw, 44px);
  border-radius: 50%;
  background: #FFCC80;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px, 3.5vw, 20px);
  font-weight: 900;
  color: #795548;
  transition: all .3s;
  position: relative;
}
.prog-dot.active { background: var(--primary); color: white; transform: scale(1.15); box-shadow: 0 4px 14px rgba(255,112,67,.4); }
.prog-dot.done   { background: var(--green);   color: white; }
.prog-line {
  width: clamp(24px, 6vw, 40px);
  height: 4px;
  background: #FFCC80;
  border-radius: 2px;
  align-self: center;
  transition: background .3s;
}
.prog-line.done { background: var(--green); }

/* ── API 설정 (관리자용, 작게) ── */
.admin-wrap {
  text-align: center;
  margin-bottom: 18px;
}
.admin-toggle {
  background: none;
  border: 2px dashed #BCAAA4;
  border-radius: 20px;
  padding: 6px 18px;
  font-size: 12px;
  font-weight: 800;
  color: #A1887F;
  cursor: pointer;
  font-family: inherit;
  transition: all .18s;
}
.admin-toggle:hover { border-color: var(--primary); color: var(--primary); }
.admin-box {
  display: none;
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-top: 10px;
  box-shadow: var(--shadow);
  text-align: left;
}
.admin-box.open { display: block; }
.admin-box label { font-size: 12px; font-weight: 900; color: var(--text); display: block; margin-bottom: 8px; }
.admin-box input {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid #FFE0B2;
  border-radius: 12px;
  font-size: 12px;
  font-family: monospace;
  color: #5D4037;
  outline: none;
}
.admin-box input:focus { border-color: var(--primary); }
.admin-status { font-size: 12px; font-weight: 800; color: var(--gray); margin-top: 8px; }
.admin-status.ok { color: var(--grn-dk); }

/* ── 없는 결과 ── */
.no-result {
  text-align: center;
  padding: 24px;
  font-size: clamp(14px,3vw,16px);
  font-weight: 800;
  color: var(--gray);
}
</style>
</head>
<body>

<!-- 배경 별 -->
<div class="bg-deco">
  <span class="star">⭐</span><span class="star">🌟</span><span class="star">✨</span>
  <span class="star">⭐</span><span class="star">🌟</span><span class="star">✨</span>
  <span class="star">⭐</span><span class="star">🌟</span>
</div>

<div class="wrap">

  <!-- 헤더 -->
  <header class="header">
    <span class="header-mascot">🦉</span>
    <h1>책 찾기 도우미</h1>
    <p class="header-sub">광명시 도서관 📚</p>
  </header>

  <!-- 진행 표시 -->
  <div class="progress-bar" id="progressBar">
    <div class="prog-dot active" id="pd1">🏛️</div>
    <div class="prog-line" id="pl1"></div>
    <div class="prog-dot" id="pd2">🔍</div>
    <div class="prog-line" id="pl2"></div>
    <div class="prog-dot" id="pd3">📖</div>
  </div>

  <!-- 말풍선 -->
  <div class="bubble-wrap" id="bubbleWrap">
    <span class="bubble-char">🦉</span>
    <div class="bubble" id="bubbleMsg">어느 도서관에 갈 거예요? 골라봐요! 👇</div>
  </div>

  <!-- STEP 1: 도서관 선택 -->
  <div class="card active" id="step1">
    <div class="step-badge">1단계</div>
    <div class="card-title">🏛️ 도서관을 골라요!</div>
    <div class="lib-grid">
      <button class="lib-btn" onclick="selectLib(this,'141019','하안도서관')">
        <span class="lib-icon">🌳</span>
        <div class="lib-name">하안<br>도서관</div>
        <div class="lib-check">✅</div>
      </button>
      <button class="lib-btn" onclick="selectLib(this,'141080','광명도서관')">
        <span class="lib-icon">⭐</span>
        <div class="lib-name">광명<br>도서관</div>
        <div class="lib-check">✅</div>
      </button>
      <button class="lib-btn" onclick="selectLib(this,'141155','충현도서관')">
        <span class="lib-icon">🏠</span>
        <div class="lib-name">충현<br>도서관</div>
        <div class="lib-check">✅</div>
      </button>
      <button class="lib-btn" onclick="selectLib(this,'141405','철산도서관')">
        <span class="lib-icon">🌈</span>
        <div class="lib-name">철산<br>도서관</div>
        <div class="lib-check">✅</div>
      </button>
      <button class="lib-btn" onclick="selectLib(this,'141561','소하도서관')">
        <span class="lib-icon">🌸</span>
        <div class="lib-name">소하<br>도서관</div>
        <div class="lib-check">✅</div>
      </button>
      <button class="lib-btn" onclick="selectLib(this,'141613','연서도서관')">
        <span class="lib-icon">🦋</span>
        <div class="lib-name">연서<br>도서관</div>
        <div class="lib-check">✅</div>
      </button>
    </div>
  </div>

  <!-- STEP 2: 책 검색 -->
  <div class="card locked" id="step2">
    <div class="step-badge" id="step2Badge">2단계</div>
    <div class="card-title">🔍 책 이름을 써요!</div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text"
             placeholder="예) 마법천자문 🔮"
             onkeydown="if(event.key==='Enter') doSearch()">
      <button class="search-btn" onclick="doSearch()">🔍</button>
    </div>

    <div class="loading" id="loadingSearch">
      <span class="loading-emoji">⏳</span>
      <p>책을 찾고 있어요...</p>
    </div>
    <div class="book-list" id="bookList"></div>
  </div>

  <!-- STEP 3: 결과 -->
  <div class="card locked" id="step3">
    <div class="step-badge" id="step3Badge">3단계</div>
    <div class="card-title">📖 빌릴 수 있나요?</div>

    <div class="loading" id="loadingExist">
      <span class="loading-emoji">🔎</span>
      <p>도서관에 물어보고 있어요...</p>
    </div>
    <div class="result-box" id="resultBox">
      <span class="result-big-emoji" id="resEmoji"></span>
      <div class="result-title" id="resTitle"></div>
      <div class="result-book-chip" id="resBook"></div>
      <div class="result-desc" id="resDesc"></div>
      <div class="result-lib-chip" id="resLib"></div>
    </div>

    <button class="reset-btn" id="resetBtn" onclick="resetAll()">
      🔄 처음부터 다시 찾아봐요!
    </button>
  </div>

  <!-- 디버그 패널 -->
  <div style="margin-bottom:16px;">
    <button onclick="document.getElementById('debugPanel').style.display=document.getElementById('debugPanel').style.display==='none'?'block':'none'"
      style="background:none;border:2px dashed #CFD8DC;border-radius:16px;padding:6px 16px;font-size:12px;font-weight:800;color:#90A4AE;cursor:pointer;font-family:inherit;">
      🐛 디버그 로그 보기
    </button>
    <div id="debugPanel" style="display:none;margin-top:10px;background:#FAFAFA;border:2px solid #ECEFF1;border-radius:16px;padding:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:12px;font-weight:900;color:#546E7A;">📋 API 호출 로그</span>
        <button onclick="document.getElementById('debugBox').innerHTML=''" style="background:none;border:1px solid #CFD8DC;border-radius:8px;padding:2px 10px;font-size:11px;cursor:pointer;">지우기</button>
      </div>
      <div id="debugBox" style="font-family:monospace;max-height:200px;overflow-y:auto;"></div>
    </div>
  </div>

  <!-- 관리자 API 설정 -->
  <div class="admin-wrap">
    <button class="admin-toggle" onclick="toggleAdmin()">⚙️ 관리자 설정</button>
    <div class="admin-box" id="adminBox">
      <label>🔑 도서관 정보나루 인증키</label>
      <input type="password" id="apiKeyInput" placeholder="인증키를 붙여넣으세요" oninput="onKeyChange()" autocomplete="off">
      <div class="admin-status" id="apiStatus">⏳ 승인 후 입력해주세요</div>
    </div>
  </div>

</div>

<script>
let AUTH_KEY = '31d4be51b69d5d56eb0d654d719c77fefefdd6cdd193b8a127fe5b7ccfbb99f0';
let selLibCode = '';
let selLibName = '';

/* ── 관리자 패널 ── */
function toggleAdmin() {
  document.getElementById('adminBox').classList.toggle('open');
}
function onKeyChange() {
  const v = document.getElementById('apiKeyInput').value.trim();
  AUTH_KEY = v;
  const st = document.getElementById('apiStatus');
  if (v.length > 20) { st.textContent = '✅ 인증키 입력 완료!'; st.className = 'admin-status ok'; }
  else               { st.textContent = '⏳ 승인 후 입력해주세요'; st.className = 'admin-status'; }
}

/* ── 진행바 업데이트 ── */
function setProgress(step) {
  // dots: 1=active, done / 2=active, done / 3=active
  const dots  = [document.getElementById('pd1'), document.getElementById('pd2'), document.getElementById('pd3')];
  const lines = [document.getElementById('pl1'), document.getElementById('pl2')];
  const icons = ['🏛️','🔍','📖'];
  const checks= ['✅','✅','✅'];

  dots.forEach((d,i) => {
    d.classList.remove('active','done');
    if (i + 1 < step)      { d.classList.add('done'); d.textContent = checks[i]; }
    else if (i + 1 === step){ d.classList.add('active'); d.textContent = icons[i]; }
    else                    { d.textContent = icons[i]; }
  });
  lines.forEach((l,i) => {
    l.classList.toggle('done', i + 1 < step);
  });
}

/* ── 말풍선 ── */
const bubbleMsgs = {
  1: '어느 도서관에 갈 거예요? 골라봐요! 👇',
  2: '찾고 싶은 책 이름을 써봐요! ✏️',
  3: '잠깐만요, 확인해볼게요! 🔎',
  ok:   '야호! 🎉 빌릴 수 있어요! 얼른 가봐요!',
  wait: '누군가 빌려갔네요 😅 조금만 기다려요!',
  none: '이 도서관엔 없어요 😢 다른 도서관은 어때요?',
};
function setBubble(key) {
  document.getElementById('bubbleMsg').textContent = bubbleMsgs[key] || '';
}

/* ── STEP 1: 도서관 선택 ── */
function selectLib(btn, code, name) {
  document.querySelectorAll('.lib-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selLibCode = code;
  selLibName = name;

  // 카드 상태
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step1').classList.add('done');
  document.getElementById('step2').classList.remove('locked');
  document.getElementById('step2').classList.add('active');

  setProgress(2);
  setBubble(2);

  setTimeout(() => {
    document.getElementById('step2').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    document.getElementById('searchInput').focus();
  }, 200);

  // 이전 결과 초기화
  resetStep3();
  document.getElementById('bookList').style.display = 'none';
  document.getElementById('bookList').innerHTML = '';
  document.getElementById('searchInput').value = '';
}

/* ── 디버그 로그 ── */
function dbLog(msg, color='#333') {
  const box = document.getElementById('debugBox');
  if (!box) return;
  const line = document.createElement('div');
  line.style.cssText = `color:${color};font-size:11px;padding:2px 0;border-bottom:1px solid #eee;word-break:break-all;`;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  box.prepend(line);
}

/* ── STEP 2: 검색 ── */
async function doSearch() {
  const kw = document.getElementById('searchInput').value.trim();
  if (!kw) { document.getElementById('searchInput').focus(); return; }

  const bl = document.getElementById('bookList');
  const ld = document.getElementById('loadingSearch');
  bl.style.display = 'none'; bl.innerHTML = '';
  ld.style.display = 'block';
  resetStep3();
  setBubble(3);

  dbLog(`🔍 검색 시작: "${kw}"`);
  dbLog(`🔑 AUTH_KEY: ${AUTH_KEY ? AUTH_KEY.slice(0,8)+'...' : '없음!'}`);

  if (!AUTH_KEY) {
    await sleep(900);
    ld.style.display = 'none';
    renderDummyBooks(kw);
    return;
  }
  try {
    const apiUrl = `https://data4library.kr/api/srchBooks?authKey=${AUTH_KEY}&title=${encodeURIComponent(kw)}&pageSize=5&format=json`;

    // 프록시 순차 시도
    const proxies = [
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      u => `https://thingproxy.freeboard.io/fetch/${u}`,
      u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    ];

    let data = null;
    for (let i = 0; i < proxies.length; i++) {
      const proxyUrl = proxies[i](apiUrl);
      dbLog(`📡 프록시 ${i+1} 시도: ${proxyUrl.slice(0,60)}...`);
      try {
        const res = await fetch(proxyUrl);
        dbLog(`📥 HTTP ${res.status}`, res.ok ? 'green' : 'red');
        if (!res.ok) continue;
        const text = await res.text();
        dbLog(`📄 응답: ${text.slice(0,100)}`);
        data = JSON.parse(text);
        dbLog(`✅ 프록시 ${i+1} 성공!`, 'green');
        break;
      } catch(pe) {
        dbLog(`❌ 프록시 ${i+1} 실패: ${pe.message}`, 'red');
      }
    }

    ld.style.display = 'none';
    if (!data) { renderNoBook(kw); return; }
    const docs = data?.response?.docs;
    dbLog(`📚 결과: ${docs?.length ?? 0}권`, docs?.length ? 'green' : 'orange');
    if (!docs || !docs.length) { renderNoBook(kw); return; }
    renderBooks(docs.map(d => d.doc));
  } catch(e) {
    dbLog(`❌ 전체 실패: ${e.message}`, 'red');
    ld.style.display = 'none';
    renderNoBook(kw);
  }
}

function renderBooks(books) {
  const bl = document.getElementById('bookList');
  bl.innerHTML = '';
  books.forEach(b => {
    const el = document.createElement('div');
    el.className = 'book-item';
    el.onclick = () => checkExist(b.isbn13, b.bookname);
    const cover = b.bookImageURL
      ? `<img class="book-cover" src="${b.bookImageURL}" alt="표지" onerror="this.outerHTML='<div class=book-cover-ph>📖</div>'">`
      : `<div class="book-cover-ph">📖</div>`;
    el.innerHTML = `
      ${cover}
      <div class="book-info">
        <div class="book-title">${b.bookname}</div>
        <div class="book-author">${b.authors||''}</div>
      </div>
      <span class="book-tap">👆</span>`;
    bl.appendChild(el);
  });
  bl.style.display = 'flex';
}

function renderDummyBooks(kw) {
  const bl = document.getElementById('bookList');
  const dummies = [
    { bookname:`${kw} 1권`, authors:'작가 이름', isbn13:'9791234560001', bookImageURL:'' },
    { bookname:`${kw}의 모험`, authors:'다른 작가', isbn13:'9791234560002', bookImageURL:'' },
    { bookname:`재미있는 ${kw}`, authors:'또 다른 작가', isbn13:'9791234560003', bookImageURL:'' },
  ];
  renderBooks(dummies);
  const note = document.createElement('div');
  note.style.cssText = 'text-align:center;font-size:12px;color:#BCAAA4;font-weight:800;padding:8px 0;';
  note.textContent = '🔑 인증키 입력 후 실제 책을 검색할 수 있어요';
  bl.appendChild(note);
}

function renderNoBook(kw) {
  const bl = document.getElementById('bookList');
  bl.innerHTML = `<div class="no-result">😅 "<b>${kw}</b>" 책을 못 찾았어요!<br><span style="font-size:13px">다른 이름으로 찾아봐요~</span></div>`;
  bl.style.display = 'flex';
  setBubble(2);
}

/* ── STEP 3: 대출 확인 ── */
async function checkExist(isbn13, bookName) {
  const s3 = document.getElementById('step3');
  s3.classList.remove('locked');
  s3.classList.add('active');

  const ld = document.getElementById('loadingExist');
  const rb = document.getElementById('resultBox');
  const resetBtn = document.getElementById('resetBtn');

  rb.style.display = 'none';
  resetBtn.classList.remove('show');
  ld.style.display = 'block';

  setProgress(3);

  setTimeout(() => s3.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);

  if (!AUTH_KEY) {
    await sleep(1300);
    ld.style.display = 'none';
    const cases = ['ok','wait','none'];
    const pick = cases[Math.floor(Math.random()*3)];
    showResult(bookName, pick === 'none' ? 'N' : 'Y', pick === 'ok' ? 'Y' : 'N', true);
    resetBtn.classList.add('show');
    return;
  }
  try {
    const apiUrl = `https://data4library.kr/api/bookExist?authKey=${AUTH_KEY}&libCode=${selLibCode}&isbn13=${isbn13}&format=json`;
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;
    const res = await fetch(proxyUrl);
    const data = await res.json();
    ld.style.display = 'none';
    const r = data?.response?.result;
    showResult(bookName, r?.hasBook, r?.loanAvailable, false);
  } catch(e) {
    ld.style.display = 'none';
    showResult(bookName, null, null, false);
  }
  resetBtn.classList.add('show');
}

function showResult(bookName, hasBook, loanAvail, isDummy) {
  const box  = document.getElementById('resultBox');
  const em   = document.getElementById('resEmoji');
  const ti   = document.getElementById('resTitle');
  const bk   = document.getElementById('resBook');
  const dc   = document.getElementById('resDesc');
  const lb   = document.getElementById('resLib');

  box.className = 'result-box';
  bk.textContent = `📖 ${bookName}`;
  lb.innerHTML   = `📍 ${selLibName}`;

  if (hasBook === 'Y' && loanAvail === 'Y') {
    box.classList.add('ok');
    em.textContent = '🎉';
    ti.textContent = '빌릴 수 있어요!';
    dc.textContent = '도서관에 있고\n지금 바로 빌릴 수 있어요! 😊\n얼른 도서관으로 가봐요!';
    setBubble('ok');
  } else if (hasBook === 'Y' && loanAvail === 'N') {
    box.classList.add('wait');
    em.textContent = '⏳';
    ti.textContent = '지금은 빌릴 수 없어요';
    dc.textContent = '다른 친구가 빌려갔어요 😅\n반납되면 빌릴 수 있어요!\n조금만 기다려봐요~';
    setBubble('wait');
  } else if (hasBook === 'N') {
    box.classList.add('none');
    em.textContent = '😢';
    ti.textContent = '이 도서관엔 없어요';
    dc.textContent = '이 책은 여기 없어요\n다른 도서관에서 찾아볼까요? 🔍';
    setBubble('none');
  } else {
    box.classList.add('err');
    em.textContent = '🤔';
    ti.textContent = '확인하지 못했어요';
    dc.textContent = '잠깐 문제가 생겼어요\n다시 한 번 눌러봐요!';
  }

  if (isDummy) {
    dc.innerHTML += '<br><br><span style="font-size:12px;color:#BCAAA4;">🔑 인증키 입력 후 실제 결과를 확인해요</span>';
  }

  document.getElementById('step3').classList.remove('active');
  document.getElementById('step3').classList.add('done');
  box.style.display = 'block';
}

/* ── 초기화 ── */
function resetStep3() {
  const s3 = document.getElementById('step3');
  s3.classList.add('locked');
  s3.classList.remove('active','done');
  document.getElementById('loadingExist').style.display = 'none';
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('resetBtn').classList.remove('show');
}

function resetAll() {
  document.querySelectorAll('.lib-btn').forEach(b => b.classList.remove('selected'));
  selLibCode = ''; selLibName = '';

  const s1 = document.getElementById('step1');
  const s2 = document.getElementById('step2');
  s1.className = 'card active';
  s2.className = 'card locked';

  document.getElementById('searchInput').value = '';
  document.getElementById('bookList').style.display = 'none';
  document.getElementById('bookList').innerHTML = '';
  document.getElementById('loadingSearch').style.display = 'none';

  resetStep3();
  setProgress(1);
  setBubble(1);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
